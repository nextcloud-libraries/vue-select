version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
    - 3. to review
    - dependencies
    groups:
      vite:
        patterns:
          - "vite"
          - "@nextcloud/vite-config"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    labels:
    - 3. to review
    - dependencies
